name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Discover Vercel project IDs
        run: |
          RESP=$(curl -sf "https://api.vercel.com/v9/projects/playlist-pulse" \
            -H "Authorization: Bearer $VERCEL_TOKEN")
          echo "VERCEL_PROJECT_ID=$(echo $RESP | jq -r '.id')" >> $GITHUB_ENV
          echo "VERCEL_ORG_ID=$(echo $RESP | jq -r '.accountId')" >> $GITHUB_ENV

      - name: Pull Vercel environment & config
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
